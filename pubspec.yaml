name: nexus
description: Cross-platform device ecosystem app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking & discovery
  network_info_plus: ^5.0.0
  connectivity_plus: ^6.0.3
  http: ^1.2.1

  # File handling
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  open_filex: ^4.3.4
  share_plus: ^9.0.0
  mime: ^1.0.5

  # Clipboard & notifications
  flutter_local_notifications: ^17.1.2
  super_clipboard: ^0.8.17

  # Cloud (Cloudflare R2 via S3-compatible API)
  minio: ^3.5.8

  # UI & UX
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  percent_indicator: ^4.2.3

  # Storage
  shared_preferences: ^2.3.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  crypto: ^3.0.3
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
